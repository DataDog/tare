schema_version: 1

metadata:
  - entrypoint: ["/app/server"]

files:
  - path: /app/server

  - path: /etc/ssl/certs/ca-certificates.crt

  - path: /etc/passwd
    present: false

  - path: /bin/sh
    present: false

scan:
  - name: app binary dependencies
    path: /app

commands:
  - name: prints version
    run: ["/app/server", "--version"]
    stdout: ["1.0.0"]

  - name: tls handshake succeeds
    run: /app/server
    exit: 0
    stdout: ["tls ok"]
