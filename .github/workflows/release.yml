name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  check:
    name: Detect release merge
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_release: ${{ steps.detect.outputs.is_release }}
    steps:
      - name: Check commit message
        id: detect
        env:
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$MESSAGE" =~ ^chore\(release\):\ prepare\ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Detected release merge: v${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not a release merge, skipping."
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.is_release == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build release binaries
        run: make release VERSION=${{ needs.check.outputs.version }}

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 5

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [check, build]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get GitHub token via dd-octo-sts
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/tare
          policy: self.github.release.push

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[/d; p; }" CHANGELOG.md > notes.md

          # Convert the reference link definition into a "Full Changelog" link
          URL=$(grep -oP '^\['"${VERSION}"'\]: \K.*' notes.md || true)
          sed -i "/^\[${VERSION}\]:/d" notes.md
          if [[ -n "$URL" ]]; then
            echo "" >> notes.md
            echo "**Full Changelog**: ${URL}" >> notes.md
          fi

          echo "=== Release notes ==="
          cat notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file notes.md \
            dist/*
          echo "### Release" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up release branch
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release/v${VERSION}" || true
